<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Apps — Finance Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Faustina:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --burgundy: #5C1A2E;
    --dusty-rose: #C17A8A;
    --gold: #C9A84C;
    --linen: #E8DDD0;
    --sand: #F7F3EE;
    --soil: #3D2B2B;
    --white: #FFFFFF;
  }
  body { font-family: 'Faustina', serif; background: var(--sand); color: var(--soil); }
  
  /* LOGIN */
  #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--burgundy); }
  .login-card { background: var(--white); border-radius: 16px; padding: 48px; width: 400px; text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,0.3); }
  .login-title { font-family: 'Cinzel', serif; font-size: 22px; color: var(--burgundy); margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: var(--dusty-rose); margin-bottom: 32px; }
  .login-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--linen); border-radius: 10px; font-family: 'Faustina', serif; font-size: 16px; color: var(--soil); background: var(--sand); margin-bottom: 14px; outline: none; }
  .login-btn { width: 100%; padding: 14px; background: var(--burgundy); color: var(--linen); border: none; border-radius: 10px; font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 1px; cursor: pointer; }
  .login-error { color: red; font-size: 13px; margin-top: 10px; display: none; }

  /* APP */
  #app { display: none; min-height: 100vh; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: var(--burgundy); position: fixed; top: 0; left: 0; bottom: 0; display: flex; flex-direction: column; }
  .sidebar-header { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-parish { font-family: 'Cinzel', serif; color: var(--gold); font-size: 12px; letter-spacing: 1.5px; margin-bottom: 4px; }
  .sidebar-title { font-family: 'Cinzel', serif; color: var(--linen); font-size: 17px; line-height: 1.3; }
  .sidebar-badge { display: inline-block; background: rgba(201,168,76,0.2); color: var(--gold); font-size: 11px; padding: 3px 8px; border-radius: 20px; margin-top: 8px; }
  .sidebar-nav { flex: 1; padding: 16px 0; }
  .nav-section { padding: 12px 24px 4px; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.3); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 24px; color: rgba(255,255,255,0.7); font-size: 15px; cursor: pointer; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--linen); }
  .nav-item.active { background: rgba(255,255,255,0.1); color: var(--gold); border-left-color: var(--gold); }
  .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1); }
  .signout-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: rgba(255,255,255,0.6); font-family: 'Cinzel', serif; font-size: 13px; cursor: pointer; }
  .main { margin-left: 260px; padding: 32px; flex: 1; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-title">Finance Council</div>
    <div class="login-sub">Saint Rose Philippine Duchesne</div>
    <input class="login-input" id="lu" type="text" placeholder="Username" />
    <input class="login-input" id="lp" type="password" placeholder="Password" />
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="lerr">Invalid credentials.</div>
  </div>
</div>

<div id="app">
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-parish">SACRED APPS</div>
        <div class="sidebar-title">Saint Rose Philippine Duchesne</div>
        <div class="sidebar-badge">Kevin McLean</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">FINANCE COUNCIL</div>
        <div class="nav-item active" onclick="showPage('dashboard', this)">💰 Revenue Dashboard</div>
        <div class="nav-item" onclick="showPage('partners', this)">🏢 Community Partners</div>
      </nav>
      <div class="sidebar-footer">
        <button class="signout-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
    <div class="main" id="main-content">
      <div id="page-dashboard">
        <h2 style="font-family:'Cinzel',serif;color:var(--burgundy);margin-bottom:24px">Revenue Dashboard</h2>
        <p>Content coming next.</p>
      </div>
      <div id="page-partners" style="display:none">
        <h2 style="font-family:'Cinzel',serif;color:var(--burgundy);margin-bottom:24px">Community Partners</h2>
        <p>Content coming next.</p>
      </div>
    </div>
  </div>
</div>

<script>
  function showPage(id, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (el) el.classList.add('active');
    document.getElementById('page-dashboard').style.display = id === 'dashboard' ? 'block' : 'none';
    document.getElementById('page-partners').style.display = id === 'partners' ? 'block' : 'none';
  }
  function signOut() {
    document.getElementById('login').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('lu').value = '';
    document.getElementById('lp').value = '';
  }
  function doLogin() {
    var u = document.getElementById('lu').value.trim();
    var p = document.getElementById('lp').value.trim();
    if (u === 'kevin' && p === 'finance2026') {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('lerr').style.display = 'block';
    }
  }
</script>
</body>
</html>
